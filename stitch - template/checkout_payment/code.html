<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Checkout - Staff Portal</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-container-lowest": "#ffffff",
                        "on-secondary-fixed": "#002204",
                        "on-error-container": "#93000a",
                        "tertiary": "#5b2500",
                        "on-tertiary-container": "#ffa777",
                        "on-surface-variant": "#434652",
                        "surface-container": "#eceeef",
                        "inverse-on-surface": "#eff1f2",
                        "surface-variant": "#e1e3e4",
                        "error": "#ba1a1a",
                        "outline-variant": "#c3c6d4",
                        "error-container": "#ffdad6",
                        "tertiary-fixed-dim": "#ffb68f",
                        "background": "#f8fafb",
                        "primary-container": "#0d47a1",
                        "on-secondary": "#ffffff",
                        "secondary-container": "#a0f399",
                        "surface-container-high": "#e6e8e9",
                        "primary-fixed": "#d9e2ff",
                        "on-tertiary-fixed-variant": "#773200",
                        "surface": "#f8fafb",
                        "surface-bright": "#f8fafb",
                        "secondary-fixed": "#a3f69c",
                        "on-primary-container": "#a1bbff",
                        "on-primary-fixed-variant": "#00429c",
                        "on-error": "#ffffff",
                        "inverse-primary": "#b0c6ff",
                        "primary-fixed-dim": "#b0c6ff",
                        "on-primary": "#ffffff",
                        "surface-tint": "#2b5bb5",
                        "primary": "#003178",
                        "tertiary-fixed": "#ffdbca",
                        "tertiary-container": "#7f3600",
                        "on-tertiary": "#ffffff",
                        "inverse-surface": "#2e3132",
                        "secondary-fixed-dim": "#88d982",
                        "surface-container-highest": "#e1e3e4",
                        "on-primary-fixed": "#001945",
                        "on-background": "#191c1d",
                        "surface-container-low": "#f2f4f5",
                        "on-secondary-container": "#217128",
                        "surface-dim": "#d8dadb",
                        "secondary": "#1b6d24",
                        "outline": "#737783",
                        "on-surface": "#191c1d",
                        "on-secondary-fixed-variant": "#005312",
                        "on-tertiary-fixed": "#331200"
                    },
                    fontFamily: {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafb; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="text-on-background min-h-screen flex flex-col max-w-[430px] mx-auto bg-surface relative">
<!-- TopAppBar -->
<header class="sticky top-0 z-50 flex items-center justify-between px-5 py-4 bg-surface-bright/80 backdrop-blur-md">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-on-surface" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="text-on-surface font-semibold text-lg tracking-tight">Checkout</h1>
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-on-surface" data-icon="more_vert">more_vert</span>
</button>
</header>
<main class="flex-1 px-5 pb-32">
<!-- Order Summary Card -->
<section class="mt-4 mb-8 bg-tertiary rounded-xl p-6 text-on-tertiary shadow-xl relative overflow-hidden">
<div class="absolute top-0 right-0 w-32 h-32 bg-tertiary-container opacity-20 rounded-full -mr-16 -mt-16"></div>
<div class="relative z-10">
<span class="text-label-sm uppercase tracking-widest opacity-80 font-medium">Order Total</span>
<div class="mt-1 flex items-baseline gap-2">
<span class="text-4xl font-bold tracking-tight">$1,347.84</span>
</div>
<div class="mt-4 flex items-center gap-2 py-2 px-3 bg-tertiary-container/30 rounded-lg w-fit">
<span class="material-symbols-outlined text-sm" data-icon="receipt_long">receipt_long</span>
<span class="text-xs font-medium">Order #88219-45</span>
</div>
</div>
</section>
<!-- Payment Methods - Bento Grid Style -->
<section class="mb-8">
<h2 class="text-label-sm font-bold uppercase tracking-wider text-on-surface-variant mb-4 px-1">Payment Method</h2>
<div class="grid grid-cols-3 gap-3">
<button class="flex flex-col items-center justify-center gap-2 p-4 rounded-xl bg-tertiary-container text-on-tertiary shadow-md ring-2 ring-tertiary">
<span class="material-symbols-outlined" data-icon="payments" style="font-variation-settings: 'FILL' 1;">payments</span>
<span class="text-xs font-semibold">Cash</span>
</button>
<button class="flex flex-col items-center justify-center gap-2 p-4 rounded-xl bg-surface-container-low text-on-surface-variant hover:bg-surface-container-high transition-all">
<span class="material-symbols-outlined" data-icon="credit_card">credit_card</span>
<span class="text-xs font-medium">Card</span>
</button>
<button class="flex flex-col items-center justify-center gap-2 p-4 rounded-xl bg-surface-container-low text-on-surface-variant hover:bg-surface-container-high transition-all">
<span class="material-symbols-outlined" data-icon="qr_code_2">qr_code_2</span>
<span class="text-xs font-medium">Digital</span>
</button>
</div>
</section>
<!-- Numeric Keypad / Input Section -->
<section class="bg-surface-container-low rounded-xl p-5 mb-6">
<div class="flex justify-between items-center mb-6 px-1">
<div>
<label class="block text-xs font-bold text-on-surface-variant uppercase tracking-tighter">Cash Received</label>
<div class="text-2xl font-bold text-tertiary mt-1">$1,350.00</div>
</div>
<div class="text-right">
<label class="block text-xs font-bold text-on-surface-variant uppercase tracking-tighter">Change Due</label>
<div class="text-2xl font-bold text-secondary mt-1">$2.16</div>
</div>
</div>
<!-- Custom Keypad Grid -->
<div class="grid grid-cols-3 gap-2">
<button class="h-14 flex items-center justify-center bg-surface-container-lowest rounded-lg font-bold text-lg text-on-surface hover:bg-surface-container-high transition-colors">1</button>
<button class="h-14 flex items-center justify-center bg-surface-container-lowest rounded-lg font-bold text-lg text-on-surface hover:bg-surface-container-high transition-colors">2</button>
<button class="h-14 flex items-center justify-center bg-surface-container-lowest rounded-lg font-bold text-lg text-on-surface hover:bg-surface-container-high transition-colors">3</button>
<button class="h-14 flex items-center justify-center bg-surface-container-lowest rounded-lg font-bold text-lg text-on-surface hover:bg-surface-container-high transition-colors">4</button>
<button class="h-14 flex items-center justify-center bg-surface-container-lowest rounded-lg font-bold text-lg text-on-surface hover:bg-surface-container-high transition-colors">5</button>
<button class="h-14 flex items-center justify-center bg-surface-container-lowest rounded-lg font-bold text-lg text-on-surface hover:bg-surface-container-high transition-colors">6</button>
<button class="h-14 flex items-center justify-center bg-surface-container-lowest rounded-lg font-bold text-lg text-on-surface hover:bg-surface-container-high transition-colors">7</button>
<button class="h-14 flex items-center justify-center bg-surface-container-lowest rounded-lg font-bold text-lg text-on-surface hover:bg-surface-container-high transition-colors">8</button>
<button class="h-14 flex items-center justify-center bg-surface-container-lowest rounded-lg font-bold text-lg text-on-surface hover:bg-surface-container-high transition-colors">9</button>
<button class="h-14 flex items-center justify-center bg-surface-container-lowest rounded-lg font-bold text-lg text-on-surface hover:bg-surface-container-high transition-colors">.</button>
<button class="h-14 flex items-center justify-center bg-surface-container-lowest rounded-lg font-bold text-lg text-on-surface hover:bg-surface-container-high transition-colors">0</button>
<button class="h-14 flex items-center justify-center bg-surface-container-highest rounded-lg text-on-surface hover:bg-surface-dim transition-colors">
<span class="material-symbols-outlined" data-icon="backspace">backspace</span>
</button>
</div>
</section>
<!-- Complete Payment Button -->
<div class="fixed bottom-24 left-1/2 -translate-x-1/2 w-full max-w-[430px] px-5 z-40">
<button class="w-full bg-tertiary text-on-tertiary h-[52px] rounded-full font-bold flex items-center justify-center gap-2 shadow-lg hover:bg-tertiary-container transition-transform active:scale-95">
                Complete Payment
                <span class="material-symbols-outlined text-xl" data-icon="check_circle">check_circle</span>
</button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[430px] h-20 bg-surface-container-lowest/80 backdrop-blur-xl flex items-center justify-around px-2 pb-2 z-50 border-t border-outline-variant/10">
<div class="flex flex-col items-center gap-1 flex-1 text-tertiary">
<div class="bg-tertiary-fixed rounded-full w-12 h-8 flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="point_of_sale" style="font-variation-settings: 'FILL' 1;">point_of_sale</span>
</div>
<span class="text-[10px] font-bold tracking-tight">Register</span>
</div>
<div class="flex flex-col items-center gap-1 flex-1 text-on-surface-variant opacity-60">
<span class="material-symbols-outlined" data-icon="receipt_long">receipt_long</span>
<span class="text-[10px] font-medium tracking-tight">Orders</span>
</div>
<div class="flex flex-col items-center gap-1 flex-1 text-on-surface-variant opacity-60">
<span class="material-symbols-outlined" data-icon="inventory_2">inventory_2</span>
<span class="text-[10px] font-medium tracking-tight">Inventory</span>
</div>
<div class="flex flex-col items-center gap-1 flex-1 text-on-surface-variant opacity-60">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="text-[10px] font-medium tracking-tight">Settings</span>
</div>
</nav>
</body></html>
