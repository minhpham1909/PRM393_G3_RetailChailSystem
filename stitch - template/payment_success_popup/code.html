<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary-fixed": "#d9e2ff",
              "on-surface": "#191c1d",
              "on-secondary-container": "#217128",
              "primary-container": "#0d47a1",
              "inverse-primary": "#b0c6ff",
              "surface-dim": "#d8dadb",
              "on-surface-variant": "#434652",
              "surface-container-highest": "#e1e3e4",
              "on-primary-fixed-variant": "#00429c",
              "on-error": "#ffffff",
              "inverse-surface": "#2e3132",
              "error": "#ba1a1a",
              "tertiary-fixed-dim": "#ffb68f",
              "error-container": "#ffdad6",
              "tertiary-container": "#7f3600",
              "on-tertiary-container": "#ffa777",
              "on-primary-container": "#a1bbff",
              "on-primary-fixed": "#001945",
              "tertiary-fixed": "#ffdbca",
              "on-secondary-fixed": "#002204",
              "on-secondary": "#ffffff",
              "surface-container-lowest": "#ffffff",
              "background": "#f8fafb",
              "outline-variant": "#c3c6d4",
              "surface-tint": "#2b5bb5",
              "tertiary": "#5b2500",
              "surface-container-high": "#e6e8e9",
              "on-tertiary": "#ffffff",
              "surface-bright": "#f8fafb",
              "on-tertiary-fixed": "#331200",
              "on-background": "#191c1d",
              "surface": "#f8fafb",
              "surface-container": "#eceeef",
              "outline": "#737783",
              "on-secondary-fixed-variant": "#005312",
              "inverse-on-surface": "#eff1f2",
              "primary-fixed-dim": "#b0c6ff",
              "primary": "#003178",
              "surface-container-low": "#f2f4f5",
              "secondary-fixed": "#a3f69c",
              "on-tertiary-fixed-variant": "#773200",
              "surface-variant": "#e1e3e4",
              "secondary": "#1b6d24",
              "secondary-container": "#a0f399",
              "on-error-container": "#93000a",
              "secondary-fixed-dim": "#88d982",
              "on-primary": "#ffffff"
            },
            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        vertical-align: middle;
      }
      body { font-family: 'Inter', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- Top App Bar (Shared Component) -->
<!-- Exclusion Protocol: For linear process "Payment Success", side/bottom nav are hidden in the focus state. -->
<header class="sticky top-0 z-50 bg-surface-bright flex items-center justify-between px-5 h-16">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-on-surface-variant cursor-pointer" data-icon="close">close</span>
<h1 class="text-title-lg font-semibold text-on-surface">Payment Success</h1>
</div>
<div class="flex items-center">
<span class="material-symbols-outlined text-on-surface-variant cursor-pointer" data-icon="more_vert">more_vert</span>
</div>
</header>
<main class="flex-grow relative flex items-center justify-center p-5">
<!-- Dimmed Background Overlay Context -->
<div class="absolute inset-0 z-0 bg-on-surface/10 backdrop-blur-sm">
<!-- Simulated background content: Bento grid skeleton -->
<div class="p-8 grid grid-cols-2 gap-4 opacity-20 select-none pointer-events-none">
<div class="h-32 bg-surface-container-high rounded-xl"></div>
<div class="h-32 bg-surface-container-high rounded-xl"></div>
<div class="h-64 col-span-2 bg-surface-container-high rounded-xl"></div>
</div>
</div>
<!-- Central Success Card -->
<div class="relative z-10 w-full max-w-md bg-surface-container-lowest rounded-xl shadow-[0_8px_24px_rgba(25,28,29,0.04)] overflow-hidden">
<!-- Header Signature Texture -->
<div class="h-2 bg-gradient-to-r from-tertiary to-tertiary-container"></div>
<div class="p-8 flex flex-col items-center text-center">
<!-- Success Icon -->
<div class="w-20 h-20 rounded-full bg-secondary-container flex items-center justify-center mb-6">
<span class="material-symbols-outlined text-on-secondary-container text-5xl" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<p class="text-label-sm font-bold tracking-[0.05em] text-on-surface-variant mb-1">TRANSACTION COMPLETE</p>
<h2 class="text-[2.5rem] font-bold text-on-surface leading-tight mb-8">$1,347.84</h2>
<!-- Transaction Details (Tonal Architecture) -->
<div class="w-full bg-surface-container-low rounded-lg p-5 mb-8 space-y-4">
<div class="flex justify-between items-center">
<span class="text-body-md text-on-surface-variant">Order ID</span>
<span class="text-body-md font-semibold text-on-surface">#88219-45</span>
</div>
<div class="flex justify-between items-center">
<span class="text-body-md text-on-surface-variant">Payment Method</span>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-on-surface-variant text-sm" data-icon="payments">payments</span>
<span class="text-body-md font-semibold text-on-surface">Cash</span>
</div>
</div>
<div class="flex justify-between items-center">
<span class="text-body-md text-on-surface-variant">Status</span>
<span class="bg-secondary-fixed text-on-secondary-fixed-variant px-3 py-1 rounded-full text-xs font-bold">PAID</span>
</div>
</div>
<!-- Action Buttons (Staff Actor Palette: Vibrant Orange) -->
<div class="w-full space-y-3">
<button class="w-full bg-tertiary text-on-tertiary font-semibold py-4 rounded-full flex items-center justify-center gap-2 shadow-sm active:scale-[0.98] transition-transform">
<span class="material-symbols-outlined" data-icon="print">print</span>
                        Print Receipt
                    </button>
<button class="w-full bg-surface-container-highest text-on-surface font-semibold py-4 rounded-full flex items-center justify-center gap-2 active:scale-[0.98] transition-transform">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="mail">mail</span>
                        Email Receipt
                    </button>
<button class="w-full text-on-surface-variant font-semibold py-3 rounded-full flex items-center justify-center gap-2 mt-2 hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined" data-icon="add">add</span>
                        New Transaction
                    </button>
</div>
</div>
<!-- Contextual Helper -->
<div class="px-8 pb-8 flex items-center justify-center gap-2 opacity-60">
<span class="material-symbols-outlined text-sm" data-icon="info">info</span>
<p class="text-label-sm">Receipt automatically synced to inventory</p>
</div>
</div>
</main>
<!-- Bottom Nav Bar (Shared Component - Hidden for Linear Process Flow) -->
<!-- The exclusion protocol applies here. Nav bars are removed to focus on the success state. -->
</body></html>
