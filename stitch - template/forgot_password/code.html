      body { font-family: 'Inter', sans-serif; }

<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar Shared Component Render -->
<header class="h-16 flex items-center px-4 bg-surface-bright sticky top-0 z-10">
<div class="flex items-center gap-4">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-on-surface-variant">arrow_back</span>
</button>
<h1 class="text-xl font-medium tracking-tight text-on-surface">Security</h1>
</div>
</header>
<!-- Main Content Area (Creative Canvas) -->
<main class="flex-grow flex items-center justify-center px-5">
<div class="w-full max-w-md">
<!-- Branding/Visual Element -->
<div class="mb-10 text-center">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-xl bg-primary text-on-primary mb-6 shadow-sm">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">lock_reset</span>
</div>
<h2 class="text-3xl font-semibold text-on-surface tracking-tight mb-3">Forgot Password</h2>
<p class="text-on-surface-variant body-md leading-relaxed px-4">
                    Enter your email address to receive a password reset code.
                </p>
</div>
<!-- Interaction Card -->
<div class="bg-surface-container-low rounded-xl p-8 space-y-8">
<div class="space-y-2">
<label class="text-xs font-bold uppercase tracking-widest text-on-surface-variant label-sm ml-1" for="email">
                        Email Address
                    </label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant group-focus-within:text-primary transition-colors">mail</span>
</div>
<input class="block w-full bg-surface-container-lowest border-none rounded-lg py-4 pl-12 pr-4 text-on-surface placeholder:text-outline-variant focus:ring-0 focus:outline-none transition-all shadow-sm" id="email" name="email" placeholder="name@prismretail.com" type="email"/>
<!-- Focus Indicator Line as per Design System -->
<div class="absolute bottom-0 left-0 right-0 h-0.5 bg-primary scale-x-0 group-focus-within:scale-x-100 transition-transform origin-center rounded-b-lg"></div>
</div>
</div>
<div class="space-y-4 pt-2">
<button class="w-full bg-primary text-on-primary py-4 px-6 rounded-full font-semibold text-lg hover:shadow-lg hover:bg-primary-container hover:text-on-primary-container transition-all flex items-center justify-center gap-2 group">
<span>Send Reset Code</span>
<span class="material-symbols-outlined text-xl transition-transform group-hover:translate-x-1">arrow_forward</span>
</button>
<div class="text-center pt-2">
<a class="text-primary font-medium hover:underline flex items-center justify-center gap-1 group" href="#">
<span class="material-symbols-outlined text-sm">chevron_left</span>
<span class="text-sm">Back to Login</span>
</a>
</div>
</div>
</div>
<!-- Security Notice -->
<div class="mt-12 text-center">
<div class="inline-flex items-center gap-2 px-3 py-1.5 bg-surface-container-high rounded-full">
<span class="material-symbols-outlined text-xs text-on-secondary-container" style="font-variation-settings: 'FILL' 1;">verified_user</span>
<span class="text-[10px] uppercase font-bold tracking-widest text-on-surface-variant">Secure Authentication</span>
</div>
</div>
</div>
</main>
<!-- iOSKeyboard Shared Component Render (Simulated) -->
<div class="mt-auto">
<div class="bg-surface-dim/20 h-1"></div>
<div class="bg-[#D1D5DB] w-full flex flex-col p-1.5 gap-2 select-none pointer-events-none opacity-50 grayscale">
<div class="flex gap-1.5 justify-center">

<div class="bg-primary/20 rounded h-10 w-24 flex items-center justify-center shadow-sm font-semibold text-xs text-primary">Go</div>
