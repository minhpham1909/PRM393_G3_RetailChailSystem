<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Prism Retail - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-error": "#ffffff",
              "on-primary-container": "#a1bbff",
              "surface-tint": "#2b5bb5",
              "tertiary-fixed": "#ffdbca",
              "inverse-on-surface": "#eff1f2",
              "surface-container-high": "#e6e8e9",
              "inverse-primary": "#b0c6ff",
              "on-secondary-container": "#217128",
              "on-secondary": "#ffffff",
              "on-surface-variant": "#434652",
              "primary-container": "#0d47a1",
              "background": "#f8fafb",
              "secondary-fixed": "#a3f69c",
              "on-primary": "#ffffff",
              "tertiary": "#5b2500",
              "on-background": "#191c1d",
              "on-primary-fixed": "#001945",
              "primary-fixed": "#d9e2ff",
              "secondary-fixed-dim": "#88d982",
              "surface-container-lowest": "#ffffff",
              "surface": "#f8fafb",
              "secondary": "#1b6d24",
              "on-tertiary-fixed-variant": "#773200",
              "outline-variant": "#c3c6d4",
              "on-surface": "#191c1d",
              "primary": "#003178",
              "primary-fixed-dim": "#b0c6ff",
              "tertiary-fixed-dim": "#ffb68f",
              "surface-variant": "#e1e3e4",
              "outline": "#737783",
              "on-primary-fixed-variant": "#00429c",
              "tertiary-container": "#7f3600",
              "error-container": "#ffdad6",
              "on-tertiary-fixed": "#331200",
              "on-secondary-fixed": "#002204",
              "error": "#ba1a1a",
              "on-secondary-fixed-variant": "#005312",
              "surface-bright": "#f8fafb",
              "on-tertiary-container": "#ffa777",
              "surface-container-highest": "#e1e3e4",
              "surface-container": "#eceeef",
              "inverse-surface": "#2e3132",
              "surface-container-low": "#f2f4f5",
              "secondary-container": "#a0f399",
              "surface-dim": "#d8dadb",
              "on-error-container": "#93000a",
              "on-tertiary": "#ffffff"
            },
            fontFamily: {
              "headline": ["Inter", "sans-serif"],
              "body": ["Inter", "sans-serif"],
              "label": ["Inter", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      body {
        font-family: 'Inter', sans-serif;
      }
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .glass-effect {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(20px);
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<main class="flex-grow flex items-center justify-center px-5 py-8">
<div class="w-full max-w-md">
<div class="text-center mb-10">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-xl bg-gradient-to-br from-primary to-primary-container text-on-primary mb-6 shadow-xl">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">
                        diamond
                    </span>
</div>
<h1 class="text-3xl font-bold tracking-tight text-on-surface mb-2 font-headline">Prism Retail</h1>
<p class="text-on-surface-variant text-sm font-label">The Digital Curator for Modern Commerce</p>
</div>
<div class="bg-surface-container-lowest p-8 rounded-xl shadow-sm border border-outline-variant/10">
<form class="space-y-6">
<div>
<label class="block text-sm font-medium text-on-surface-variant mb-2 ml-1" for="email">Email Address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-xl">mail</span>
</div>
<input class="block w-full pl-11 pr-4 py-3 bg-surface-container-low border-transparent rounded-lg focus:ring-0 focus:border-primary border-b-2 transition-all text-on-surface placeholder-outline/50" id="email" name="email" placeholder="name@prismretail.com" required="" type="email"/>
</div>
</div>
<div>
<div class="flex justify-between items-center mb-2 ml-1">
<label class="block text-sm font-medium text-on-surface-variant" for="password">Password</label>
<a class="text-xs font-semibold text-primary hover:text-primary-container transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-xl">lock</span>
</div>
<input class="block w-full pl-11 pr-4 py-3 bg-surface-container-low border-transparent rounded-lg focus:ring-0 focus:border-primary border-b-2 transition-all text-on-surface" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<div class="flex items-center">
<input class="h-4 w-4 text-primary focus:ring-primary border-outline-variant rounded" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block text-sm text-on-surface-variant" for="remember-me">
                            Remember this device
                        </label>
</div>
<button class="w-full flex justify-center items-center py-4 px-4 border border-transparent rounded-full shadow-lg text-sm font-bold text-on-primary bg-primary hover:bg-primary-container focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all uppercase tracking-widest" type="submit">
                        Login
                    </button>
</form>
<div class="mt-8 pt-8 border-t border-surface-container-high">
<p class="text-center text-xs text-on-surface-variant font-label uppercase tracking-tighter">
                        Authorized Personnel Only
                    </p>
<div class="flex justify-center gap-4 mt-4">
<div class="flex items-center gap-1 px-3 py-1 rounded-full bg-secondary-container/20">
<div class="w-1.5 h-1.5 rounded-full bg-secondary"></div>
<span class="text-[10px] font-bold text-on-secondary-fixed-variant uppercase">System Active</span>
</div>
<div class="flex items-center gap-1 px-3 py-1 rounded-full bg-primary-fixed/20">
<span class="material-symbols-outlined text-[12px] text-primary">security</span>
<span class="text-[10px] font-bold text-on-primary-fixed-variant uppercase">Encrypted</span>
</div>
</div>
</div>
</div>
<div class="mt-12 grid grid-cols-3 gap-4">
<div class="h-1 bg-surface-container-high rounded-full overflow-hidden">
<div class="h-full bg-primary w-full opacity-20"></div>
</div>
<div class="h-1 bg-surface-container-high rounded-full overflow-hidden">
<div class="h-full bg-secondary w-full opacity-20"></div>
</div>
<div class="h-1 bg-surface-container-high rounded-full overflow-hidden">
<div class="h-full bg-tertiary w-full opacity-20"></div>
</div>
</div>
<p class="mt-8 text-center text-[11px] text-outline font-label uppercase tracking-widest leading-loose">
                © 2024 Prism Retail Management Systems <br/>
                Enterprise Version 4.2.0-Editorial
            </p>
</div>
</main>
<div class="fixed bottom-0 left-0 right-0 h-[30vh] -z-10 pointer-events-none overflow-hidden">
<div class="absolute bottom-[-10%] left-[-10%] w-[50%] h-[100%] bg-primary/5 blur-[120px] rounded-full"></div>
<div class="absolute bottom-[-5%] right-[-5%] w-[40%] h-[80%] bg-secondary/5 blur-[100px] rounded-full"></div>
</div>
</body></html>
