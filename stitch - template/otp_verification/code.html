<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-variant": "#e1e3e4",
              "on-secondary-container": "#217128",
              "secondary": "#1b6d24",
              "on-surface-variant": "#434652",

              "on-tertiary": "#ffffff",
              "error": "#ba1a1a",
              "primary-fixed": "#d9e2ff",
              "tertiary": "#5b2500",
              "on-tertiary-container": "#ffa777",
              "secondary-container": "#a0f399",
              "outline": "#737783",
              "secondary-fixed-dim": "#88d982",
              "primary": "#003178",
              "on-primary-fixed-variant": "#00429c",
              "on-error-container": "#93000a",
              "inverse-surface": "#2e3132",
              "primary-fixed-dim": "#b0c6ff",
              "on-tertiary-fixed": "#331200",
              "tertiary-fixed": "#ffdbca",
              "surface-container-highest": "#e1e3e4",
              "on-primary": "#ffffff",
              "surface-container-high": "#e6e8e9",
              "primary-container": "#0d47a1",
              "tertiary-container": "#7f3600",
              "on-secondary": "#ffffff",
              "on-error": "#ffffff",
              "surface-container": "#eceeef",
              "surface-container-low": "#f2f4f5",
              "surface-bright": "#f8fafb",
              "surface-dim": "#d8dadb",
              "surface-container-lowest": "#ffffff",
              "background": "#f8fafb",
              "on-background": "#191c1d",
              "on-surface": "#191c1d",
              "on-primary-fixed": "#001945",
              "tertiary-fixed-dim": "#ffb68f",
              "on-tertiary-fixed-variant": "#773200",
              "surface-tint": "#2b5bb5",
              "surface": "#f8fafb",
              "on-secondary-fixed-variant": "#005312",
              "secondary-fixed": "#a3f69c",
              "inverse-on-surface": "#eff1f2",
              "on-primary-container": "#a1bbff",
              "outline-variant": "#c3c6d4",
              "on-secondary-fixed": "#002204"
            },
            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Inter', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="flex items-center px-5 h-16 bg-surface-bright sticky top-0 z-10">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-on-surface" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="ml-4 font-headline text-lg font-semibold text-on-surface">Security</h1>
</header>
<main class="flex-grow flex flex-col px-5 pt-8 max-w-md mx-auto w-full">
<!-- Content Area -->
<section class="space-y-8">
<!-- Header Text -->
<div class="space-y-2">
<h2 class="text-3xl font-headline font-bold text-primary tracking-tight">Verify Account</h2>
<p class="text-on-surface-variant font-body leading-relaxed">
                    We sent a verification code to your email. Please enter it below.
                </p>
</div>
<!-- OTP Input Group -->
<div class="space-y-6">
<div class="flex justify-between gap-2 sm:gap-4">
<!-- Standard 6-digit inputs -->
<input class="w-12 h-14 sm:w-14 sm:h-16 text-center text-2xl font-bold bg-surface-container-lowest border-none rounded-xl shadow-sm ring-1 ring-outline-variant focus:ring-2 focus:ring-primary focus:outline-none transition-all" maxlength="1" placeholder="•" type="text"/>
<input class="w-12 h-14 sm:w-14 sm:h-16 text-center text-2xl font-bold bg-surface-container-lowest border-none rounded-xl shadow-sm ring-1 ring-outline-variant focus:ring-2 focus:ring-primary focus:outline-none transition-all" maxlength="1" placeholder="•" type="text"/>
<input class="w-12 h-14 sm:w-14 sm:h-16 text-center text-2xl font-bold bg-surface-container-lowest border-none rounded-xl shadow-sm ring-1 ring-outline-variant focus:ring-2 focus:ring-primary focus:outline-none transition-all" maxlength="1" placeholder="•" type="text"/>
<input class="w-12 h-14 sm:w-14 sm:h-16 text-center text-2xl font-bold bg-surface-container-lowest border-none rounded-xl shadow-sm ring-1 ring-outline-variant focus:ring-2 focus:ring-primary focus:outline-none transition-all" maxlength="1" placeholder="•" type="text"/>
<input class="w-12 h-14 sm:w-14 sm:h-16 text-center text-2xl font-bold bg-surface-container-lowest border-none rounded-xl shadow-sm ring-1 ring-outline-variant focus:ring-2 focus:ring-primary focus:outline-none transition-all" maxlength="1" placeholder="•" type="text"/>
<input class="w-12 h-14 sm:w-14 sm:h-16 text-center text-2xl font-bold bg-surface-container-lowest border-none rounded-xl shadow-sm ring-1 ring-outline-variant focus:ring-2 focus:ring-primary focus:outline-none transition-all" maxlength="1" placeholder="•" type="text"/>
</div>
<!-- Timer & Resend -->
<div class="flex flex-col items-center justify-center space-y-4 pt-4">
<div class="flex items-center gap-2 px-4 py-2 bg-surface-container-low rounded-full">
<span class="material-symbols-outlined text-sm text-outline" data-icon="timer">timer</span>
<span class="text-sm font-label font-medium text-on-surface-variant">Resend in <span class="text-on-surface tabular-nums">00:45</span></span>
</div>
<button class="text-primary font-label text-sm font-semibold opacity-50 cursor-not-allowed uppercase tracking-wider">
                        Resend Code
                    </button>
</div>
</div>
<!-- Primary Action -->
<div class="pt-4">
<button class="w-full h-14 bg-primary text-on-primary rounded-full font-label font-bold text-md shadow-lg shadow-primary/10 hover:bg-primary-container transition-all flex items-center justify-center gap-2">
                    Verify &amp; Proceed
                    <span class="material-symbols-outlined text-lg" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</section>
<!-- Decorative Anchor -->
<div class="mt-16 bg-surface-container-low p-6 rounded-2xl flex items-center gap-4">
<div class="w-12 h-12 bg-primary-fixed rounded-xl flex items-center justify-center">
<span class="material-symbols-outlined text-on-primary-fixed-variant" data-icon="shield">shield</span>
</div>
<div>
<p class="text-sm font-label font-bold text-on-surface">Secure Environment</p>
<p class="text-xs font-body text-on-surface-variant">Prism Retail uses 256-bit encryption to protect your account details.</p>
</div>
</div>
</main>
<!-- iOS Keyboard Simulator (Static UI) -->
<div class="mt-auto bg-surface-dim/20 backdrop-blur-md pt-2">
<div class="bg-gray-200/80 p-2 space-y-2">
<div class="flex justify-center gap-1.5">
<div class="bg-white py-3 flex-1 text-center rounded-lg shadow font-semibold text-lg">1</div>
<div class="bg-white py-3 flex-1 text-center rounded-lg shadow font-semibold text-lg">2</div>
<div class="bg-white py-3 flex-1 text-center rounded-lg shadow font-semibold text-lg">3</div>
</div>
<div class="flex justify-center gap-1.5">
<div class="bg-white py-3 flex-1 text-center rounded-lg shadow font-semibold text-lg">4</div>
<div class="bg-white py-3 flex-1 text-center rounded-lg shadow font-semibold text-lg">5</div>
<div class="bg-white py-3 flex-1 text-center rounded-lg shadow font-semibold text-lg">6</div>
</div>
<div class="flex justify-center gap-1.5">
<div class="bg-white py-3 flex-1 text-center rounded-lg shadow font-semibold text-lg">7</div>
<div class="bg-white py-3 flex-1 text-center rounded-lg shadow font-semibold text-lg">8</div>
<div class="bg-white py-3 flex-1 text-center rounded-lg shadow font-semibold text-lg">9</div>
</div>
<div class="flex justify-center gap-1.5">
<div class="bg-transparent py-3 flex-1"></div>
<div class="bg-white py-3 flex-1 text-center rounded-lg shadow font-semibold text-lg">0</div>
<div class="bg-transparent py-3 flex-1 flex items-center justify-center">
<span class="material-symbols-outlined text-gray-700" data-icon="backspace">backspace</span>
</div>
</div>
<div class="h-1 w-32 bg-on-surface/20 mx-auto rounded-full mt-2 mb-1"></div>
</div>
</div>
</body></html>
